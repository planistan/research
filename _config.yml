title: Planistan Research
tagline: Research notes. Part of the Planistan project.
description: Research notes and long-form analysis. Part of the Planistan UK planning data project.
theme: jekyll-theme-chirpy
lang: en-GB
timezone: Europe/London

social:
  email: planistan@proton.me

markdown: kramdown
highlighter: rouge
paginate: 10

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
